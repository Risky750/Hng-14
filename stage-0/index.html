<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>



<article id="card" data-testid="test-todo-card">

  <!-- HEADER -->
  <div class="row">
    <label style="display:flex; align-items:center; gap:10px;">
      <input
        type="checkbox"
        id="toggle"
        data-testid="test-todo-complete-toggle"
        aria-label="Mark task complete"
      />
      <span></span>
    </label>

    <span
      class="badge high"
      data-testid="test-todo-priority"
      aria-label="Priority High"
    >
      High
    </span>
  </div>

  <!-- TITLE -->
  <h2 data-testid="test-todo-title">Finish UI Todo Card</h2>

  <!-- DESCRIPTION -->
  <p data-testid="test-todo-description">
    Build a fully accessible and responsive todo card with proper semantics and test IDs.
  </p>

  <!-- STATUS + TIME -->
  <div class="row">
    <span
      class="badge status"
      data-testid="test-todo-status"
    >
      Pending
    </span>

    <time
      data-testid="test-todo-due-date"
      datetime="2026-04-12T18:00:00Z"
    >
      Due Apr 12, 2026
    </time>
  </div>

  <div
    data-testid="test-todo-time-remaining"
    aria-live="polite"
  >
    Due in 2 days
  </div>

  <!-- TAGS -->
  <ul data-testid="test-todo-tags" role="list">
    <li data-testid="test-todo-tag-work">work</li>
    <li data-testid="test-todo-tag-urgent">urgent</li>
    <li>design</li>
  </ul>

  <!-- ACTIONS -->
  <div class="actions">
    <button
      data-testid="test-todo-edit-button"
      aria-label="Edit todo"
    >
      Edit
    </button>

    <button
      data-testid="test-todo-delete-button"
      aria-label="Delete todo"
    >
      Delete
    </button>
  </div>


</article>

<script src="./script.js"></script>
</body>
</html>
